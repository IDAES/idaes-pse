name: Release dry run (tag build)

on:
  push:
    tags:
      - "*"

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build package
        run: |
          python -m pip install --upgrade pip
          pip install "setuptools<82" setuptools_scm build packaging
          python -m setuptools_scm
          python -m build --outdir dist

      - name: Install wheel and verify version
        run: |
          pip install dist/*.whl
          python - <<'PY'
          import os
          from importlib.metadata import version
          from packaging.version import Version

          tag = os.environ["GITHUB_REF_NAME"]
          expected = str(Version(tag))
          got = version("idaes-pse")
          print(f"{tag=}\n{expected=}\n{got=}")
          assert got == expected
          PY

      - name: Smoke import
        run: python -c "import idaes; print('ok')"